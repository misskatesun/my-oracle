    function draw() {
        const btn = document.getElementById('draw-btn');
        const display = document.getElementById('display-area');
        const tag = document.getElementById('category-tag');
        const downloadBtn = document.getElementById('download-btn');
        
        btn.disabled = true;
        downloadBtn.style.display = 'none';
        tag.innerHTML = "連結中...";
        display.classList.remove('style-pos', 'style-neg');
        display.innerHTML = `<div class="content-text loading-dots" style="color:#888;">正在接收宇宙訊息</div>`;

        setTimeout(() => {
            const card = database[Math.floor(Math.random() * database.length)];
            const formattedText = card.t.replace(/[，、,]/g, '$&<br>');
            
            // 這裡確保分類 (cat) 會正確顯示
            tag.innerHTML = `宇宙源頭神諭指引<br>(${card.cat})`;
            
            if (card.type === 1) {
                display.classList.add('style-pos');
                display.innerHTML = `<div class="instruction">【下載資料】</div><div class="content-text">${formattedText}</div><div class="instruction">( YES! 謝謝你、我愛你 )</div>`;
            } else {
                display.classList.add('style-neg');
                display.innerHTML = `<div class="instruction">【清理資料】</div><div class="content-text">${formattedText}</div><div class="instruction">( 對不起．請原諒我．謝謝你．我愛你 )</div>`;
            }
            btn.disabled = false;
            downloadBtn.style.display = 'inline-block';
        }, 1000);
    }

    function generatePreview() {
        const target = document.getElementById('capture-area');
        const btn = document.getElementById('download-btn');
        btn.innerText = "圖片生成中...";

        html2canvas(target, {
            useCORS: true,
            scale: 3,
            backgroundColor: "#ffffff",
            onclone: (clonedDoc) => {
                const area = clonedDoc.getElementById('capture-area');
                area.style.padding = "40px 20px";
                area.style.borderRadius = "0px";
                area.style.width = "420px"; // 稍微加寬，給長句子空間
                
                const ins = clonedDoc.querySelectorAll('.instruction');
                ins.forEach(el => { 
                    el.style.fontSize = "14px"; // 截圖字體維持清晰
                    el.style.letterSpacing = "-0.5px";
                });
            }
        }).then(canvas => {
            const previewOverlay = document.getElementById('preview-overlay');
            const previewImage = document.getElementById('preview-image');
            previewImage.src = canvas.toDataURL('image/png');
            previewOverlay.style.display = 'flex';
            btn.innerText = "📸 生成分享圖片 (可存相簿)";
        });
    }

        document.getElementById('preview-overlay').style.display = 'none';
