<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>意識神諭卡｜清理與下載</title>
    <style>
        :root {
            /* 修改 1: 將負面色調改為暖橘色 */
            --pos-bg: rgba(240, 253, 244, 0.9); --pos-text: #166534; --pos-border: #bbf7d0;
            --neg-bg: rgba(255, 247, 237, 0.9); --neg-text: #9a3412; --neg-border: #fed7aa;
            --primary: #484891; /* 修改 4: 按鈕顏色 */
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            /* 修改 2: 換成宇宙背景照片 */
            background: url('https://images.pexels.com/photos/13444721/pexels-photo-13444721.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2') no-repeat center center fixed;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card-box {
            background: rgba(255, 255, 255, 0.85); /* 半透明白色，透出背景的美 */
            backdrop-filter: blur(5px); /* 磨砂玻璃效果 */
            padding: 2.5rem; border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%; max-width: 450px; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .tag {
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            font-size: 0.85rem; margin-bottom: 20px; font-weight: bold; letter-spacing: 1px;
        }
        #display-area {
            min-height: 200px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 20px 0; padding: 25px; border-radius: 18px;
            border: 2px solid #eee; transition: all 0.3s ease;
        }
        .content-text { font-size: 1.35rem; font-weight: 600; line-height: 1.7; margin-bottom: 12px; }
        .instruction { font-size: 0.95rem; opacity: 0.9; font-weight: 500; }
        
        button {
            background: var(--primary); color: white; border: none;
            padding: 16px 40px; font-size: 1.1rem; border-radius: 50px;
            cursor: pointer; transition: 0.3s; width: 100%;
            box-shadow: 0 4px 15px rgba(72, 72, 145, 0.4);
        }
        button:hover { background: #363670; transform: translateY(-2px); }

        .support-btn {
            margin-top: 35px; display: flex; gap: 12px; justify-content: center;
        }
        .support-btn a {
            text-decoration: none; color: #484891; font-size: 0.85rem;
            padding: 8px 15px; border: 1px solid #484891; border-radius: 8px;
            background: rgba(255,255,255,0.5); transition: 0.2s;
        }
        .support-btn a:hover { background: #484891; color: white; }

        .style-pos { background: var(--pos-bg) !important; color: var(--pos-text) !important; border-color: var(--pos-border) !important; }
        .style-neg { background: var(--neg-bg) !important; color: var(--neg-text) !important; border-color: var(--neg-border) !important; }
    </style>
</head>
<body>

<div class="card-box">
    <div id="category-tag" class="tag" style="background: rgba(238,238,238,0.8); color: #444;">點擊按鈕開啟訊息</div>
    <div id="display-area">
        <div class="content-text" style="color:#555;">閉上眼，連結宇宙源頭...</div>
    </div>
    <button onclick="draw()">抽取意識卡片</button>

    <div class="support-btn">
        <a href="https://p.ecpay.com.tw/C887CAB" target="_blank">☕ 台灣隨喜支持</a>
        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=s9413494134@gmail.com&item_name=SophiaOracleSupport&currency_code=USD" target="_blank">🌎 海外隨喜支持</a>
    </div>
</div>

<script>
    // 資料庫保持不變（略，請延用之前的 100 條資料內容）
    const database = [
        /* ... 這裡請放入之前那 100 條資料內容 ... */
        { t: "我值得無條件的愛", type: 1, cat: "靈性成長" },
        { t: "財富自由是可能的、安全的、被允許的、很正常的", type: 1, cat: "金錢與財富" },
        { t: "不用努力就會有錢", type: 1, cat: "金錢與財富" },
        { t: "我得證明自己值得被愛", type: 0, cat: "感情與伴侶" },
        { t: "有錢就會有危險", type: 0, cat: "金錢與財富" },
        { t: "我必須很努力才會有錢", type: 0, cat: "金錢與財富" }
        // (請在此處補回剩下的語句)
    ];

    function draw() {
        const display = document.getElementById('display-area');
        const tag = document.getElementById('category-tag');
        const card = database[Math.floor(Math.random() * database.length)];
        
        tag.innerText = card.cat;
        display.classList.remove('style-pos', 'style-neg');
        
        if (card.type === 1) {
            display.classList.add('style-pos');
            // 修改 3: 正面資料下方加入 YES! 謝謝你、我愛你
            display.innerHTML = `<div class="instruction">【宇宙下載】</div><div class="content-text">${card.t}</div><div class="instruction">YES! 謝謝你、我愛你</div>`;
        } else {
            display.classList.add('style-neg');
            // 修改 1: 負面資料的樣式已改為橘色
            display.innerHTML = `<div class="instruction">【零極限清理】</div><div class="content-text">${card.t}</div><div class="instruction">( 對不起、請原諒我、謝謝你、我愛你 )</div>`;
        }
    }
</script>

</body>
</html>
