        }
        .card-box {

            width: 100%; max-width: 450px; text-align: center;
        }
        .tag {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.8rem; margin-bottom: 15px; font-weight: bold;
        }
        #display-area {
            min-height: 180px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 20px 0; padding: 25px; border-radius: 18px;
            border: 2px solid #eee; transition: all 0.3s ease;
        }
        .content-text { font-size: 1.3rem; font-weight: 600; line-height: 1.6; margin-bottom: 10px; }
        .instruction { font-size: 0.9rem; opacity: 0.8; }
        
        button {
            background: var(--primary); color: white; border: none;
            padding: 15px 40px; font-size: 1.1rem; border-radius: 50px;
            cursor: pointer; transition: 0.3s; width: 100%;
        }
        button:hover { background: #4f46e5; transform: translateY(-2px); }

        .support-btn {
            margin-top: 30px; display: flex; gap: 10px; justify-content: center;
        }
        .support-btn a {
            text-decoration: none; color: #666; font-size: 0.85rem;
            padding: 8px 15px; border: 1px solid #ddd; border-radius: 8px;
        }
        /* 樣式切換 */
        .style-pos { background: var(--pos-bg) !important; color: var(--pos-text) !important; border-color: var(--pos-border) !important; }
        .style-neg { background: var(--neg-bg) !important; color: var(--neg-text) !important; border-color: var(--neg-border) !important; }
